name: numa-demo

services:
  kern-numa:
    image: kern-runtime:numa-demo
    container_name: kern-numa
    init: true
    read_only: true
    restart: unless-stopped
    env_file:
      - ./env.runtime
    environment:
      KERN_RUNTIME_CONFIG_PATH: /app/config/runtime.installation.json
      KERN_EVIDENCE_FILE_PATH: /app/evidence/evidence.jsonl
    volumes:
      - ./runtime.installation.json:/app/config/runtime.installation.json:ro
      - ./data:/app/data
      - ./evidence:/app/evidence
      - ./memory:/app/memory
      - ./logs:/app/logs
    tmpfs:
      - /tmp
    networks:
      - kern_numa_internal
      - numa_db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const net=require('node:net');
          const socket=net.connect(8787,'127.0.0.1');
          const timeout=setTimeout(()=>process.exit(1),2000);
          socket.on('connect',()=>{clearTimeout(timeout);socket.end();process.exit(0)});
          socket.on('error',()=>process.exit(1));
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

networks:
  kern_numa_internal:
    external: true
  numa_db:
    external: true
