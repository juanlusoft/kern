services:
  kern-numa:
    build:
      context: ../..
      dockerfile: deploy/numa-demo/Dockerfile
    image: kern-runtime:numa-demo
    container_name: kern-numa
    init: true
    read_only: true
    restart: unless-stopped
    env_file:
      - ./env.runtime
    environment:
      KERN_RUNTIME_CONFIG_PATH: /app/config/runtime.installation.json
      KERN_EVIDENCE_FILE_PATH: /app/evidence/evidence.jsonl
    volumes:
      - ./runtime.installation.json:/app/config/runtime.installation.json:ro
      - ./data:/app/data
      - ./evidence:/app/evidence
      - ./memory:/app/memory
      - ./logs:/app/logs
    tmpfs:
      - /tmp
    networks:
      - openwebui_default
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  openwebui_default:
    external: true
